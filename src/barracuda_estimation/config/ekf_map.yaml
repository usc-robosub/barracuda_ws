                  false, false, false,
                  false, false, false,
                  true,  true,  true,
                  false, false, false]
    imu0_nodelay: true
    imu0_differential: false
    imu0_relative: true
    imu0_queue_size: 5
    imu0_pose_rejection_threshold: 50.0
    imu0_twist_rejection_threshold: 50.0
    imu0_linear_acceleration_rejection_threshold: 0.8
    imu0_remove_gravitational_acceleration: false

