barracuda/ekf_map:
  ros__parameters:
    frequency: 50.0
    silent_tf_failure: false
    two_d_mode: false
    transform_time_offset: 0.0
    transform_timeout: 0.0
    print_diagnostics: true
    debug: false
    publish_tf: true
    publish_acceleration: false
    permit_corrected_publication: false

    map_frame: map
    odom_frame: barracuda/odom
    base_link_frame: barracuda/base_link
    world_frame: map

    # Global filter: fuse local continuous sensors plus a global pose source
    # when one is available (for example /barracuda/slam/odometry from a future
    # GTSAM mapping/localization node).
    odom0: /barracuda/slam/odometry
    odom0_config: [true,  true,  true,
                   true,  true,  true,
                   false, false, false,
                   false, false, false,
                   false, false, false]
    odom0_queue_size: 2
    odom0_nodelay: false
    odom0_differential: false
    odom0_relative: false
    odom0_pose_rejection_threshold: 5.0
    odom0_twist_rejection_threshold: 1.0

    odom1: /barracuda/dvl/odometry
    odom1_config: [false, false, false,
                   false, false, false,
                   true,  true,  true,
                   false, false, false,
                   false, false, false]
    odom1_queue_size: 3
    odom1_nodelay: false
    odom1_differential: false
    odom1_relative: false
    odom1_pose_rejection_threshold: 5.0
    odom1_twist_rejection_threshold: 2.0

    imu0: /barracuda/imu/data
