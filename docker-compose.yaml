services:
  jetson:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PLATFORM: jetson
      ROS_DOMAIN_ID: "0"
    user: root
    privileged: true
    image: ${USER}-barracuda-onboard-jetson
    container_name: ${USER}-barracuda-onboard-jetson
    tty: true
    network_mode: host
    # ipc: host
    volumes:
      - ${PWD}/src:/root/ros2_ws/src

  laptop:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PLATFORM: laptop
      ROS_DOMAIN_ID: "0"
    user: root
    privileged: true
    image: barracuda-onboard-laptop
    container_name: barracuda-onboard-laptop
    tty: true
    # network_mode: host
    # ipc: host
    ports:
      - 8765:8765
    volumes:
      - ${PWD}/src:/root/ros2_ws/src
    profiles: ["laptop"]
