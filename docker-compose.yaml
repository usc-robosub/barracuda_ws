###########################################################################
# docker compose services: host, host-no-launch, bridge, bridge-no-launch #
###########################################################################

# the services are first split up by network mode, then by launch behavior:
 
# when running a container on the jetson, we use the host networking mode
# so other devices (e.g. sensors,land computer running foxglove) can access
# the container via their network connection to the jetson

# when running a container on a machine where we want another program on the
# same machine to be able to connect to the container over the network (a use
# case for this would be connecting foxglove running locally to
# a container also running locally), we use the bridge networking mode

# the host and bridge services will spin up a container that automatically
# launches barracuda_onboard.launch.py (which includes the launch files for
# all packages, or the packages specified by PKG_SEL if that environment var
# is set - see the readme for more on PKG_SEL)

# the x-no-launch services will not launch anything upon spinning up the container -
# these services set the NO_LAUNCH environment var, which entrypoint.sh checks to
# determine the launch behavior (when it's set the ros2 launch call gets skipped)

# default service is "host"
services:
  host:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PKG_SEL: ${PKG_SEL:-}
    environment:
      IMG_ID: ${IMG_ID:-}
      ROS_DOMAIN_ID: "0"
    user: root
    privileged: true
    image: ${USER}-barracuda-onboard${IMG_ID:+-${IMG_ID}}
    container_name: ${USER}-barracuda-onboard${IMG_ID:+-${IMG_ID}}
    tty: true
    network_mode: host
    ipc: host
    runtime: nvidia
    volumes:
      - ${PWD}/src:/root/barracuda_ws/src

  host-no-launch:
    extends: host
    environment:
      NO_LAUNCH: true
      ROS_DOMAIN_ID: "0"
    profiles: ["host-no-launch"]

  bridge:
    extends: host
    network_mode: bridge
    ports:
      - 8765:8765
    profiles: ["bridge"]
    runtime: runc # this is the default runtime value

  bridge-no-launch:
    extends: bridge
    environment:
      NO_LAUNCH: true
      ROS_DOMAIN_ID: "0"
    profiles: ["bridge-no-launch"]
